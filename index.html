<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងទិន្នន័យវាល</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f4f8; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; margin-bottom: 30px; }
        video, #preview { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 4/3; object-fit: cover; }
        #preview { display: none; }
        .info-box { background: #f9f9f9; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.9rem; border: 1px solid #ddd; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Kantumruy Pro'; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Kantumruy Pro'; margin-bottom: 10px; }
        .btn-cap { background: #007bff; color: white; }
        .btn-save { background: #28a745; color: white; }
        .btn-refresh { background: #f39c12; color: white; }
        
        /* តារាងបង្ហាញទិន្នន័យ */
        .table-container { width: 100%; max-width: 900px; overflow-x: auto; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #007bff; color: white; }
        img.thumb { width: 50px; height: 40px; border-radius: 4px; object-fit: cover; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:#333;">កត់ត្រាទិន្នន័យចុះវាល</h2>
    <video id="webcam" autoplay playsinline></video>
    <img id="preview">

    <div class="info-box">
        <input type="text" id="customerName" placeholder="បញ្ចូលឈ្មោះអតិថិជន...">
        <div><strong>លេខរៀង:</strong> <span id="recordNo">--</span></div>
        <div><strong>កាលបរិច្ឆេទ:</strong> <span id="dateTime">--</span></div>
        <div><strong>តំបន់:</strong> <span id="addressText">កំពុងស្វែងរក...</span></div>
        <div><strong>GPS:</strong> <span id="location">--</span></div>
    </div>
    
    <button class="btn-cap" onclick="takeSnapshot()">ថតរូប</button>
    <button id="saveBtn" class="btn-save" onclick="saveToDatabase()" disabled>រក្សាទុកក្នុង Database</button>
    <button class="btn-refresh" onclick="window.location.reload()">Refresh</button>
</div>

<div class="table-container">
    <h3 style="margin-top:0;">បញ្ជីទិន្នន័យដែលបានរក្សាទុក (អក្សរខ្មែរ)</h3>
    <table id="dataTable">
        <thead>
            <tr>
                <th>ល.រ</th>
                <th>កាលបរិច្ឆេទ</th>
                <th>ឈ្មោះ</th>
                <th>តំបន់</th>
                <th>GPS</th>
                <th>រូបភាព</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let db;
    const video = document.getElementById('webcam');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('hiddenCanvas');
    const saveBtn = document.getElementById('saveBtn');
    
    let capturedImg = null;
    let currentAddress = "កំពុងស្វែងរក...";
    let currentGPS = "--";

    // ១. បង្កើត Database (IndexedDB)
    const request = indexedDB.open("FieldDataDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        displayData(); // បង្ហាញទិន្នន័យពេលបើក App
        updateNextID();
    };

    // ២. បើកកាមេរ៉ា និង GPS
    async function init() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        
        setInterval(() => { document.getElementById('dateTime').textContent = new Date().toLocaleString('km-KH'); }, 1000);

        navigator.geolocation.watchPosition(async pos => {
            currentGPS = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
            document.getElementById('location').textContent = currentGPS;
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}&accept-language=km`);
            const data = await res.json();
            currentAddress = data.display_name || "មិនស្គាល់តំបន់";
            document.getElementById('addressText').textContent = currentAddress;
        });
    }

    // ៣. ថតរូប
    function takeSnapshot() {
        if(!document.getElementById('customerName').value) return alert("សូមបញ្ចូលឈ្មោះ!");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        capturedImg = canvas.toDataURL('image/jpeg');
        preview.src = capturedImg;
        preview.style.display = 'block';
        video.style.display = 'none';
        saveBtn.disabled = false;
    }

    // ៤. រក្សាទុកក្នុង Database
    function saveToDatabase() {
        const transaction = db.transaction(["records"], "readwrite");
        const store = transaction.objectStore("records");
        const data = {
            name: document.getElementById('customerName').value,
            date: document.getElementById('dateTime').textContent,
            address: currentAddress,
            gps: currentGPS,
            image: capturedImg
        };
        store.add(data);
        transaction.oncomplete = () => {
            alert("រក្សាទុកក្នុង Database រួចរាល់!");
            window.location.reload();
        };
    }

    // ៥. បង្ហាញទិន្នន័យក្នុងតារាង
    function displayData() {
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "";
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            e.target.result.forEach(row => {
                const tr = `<tr>
                    <td>${row.id}</td>
                    <td>${row.date}</td>
                    <td>${row.name}</td>
                    <td style="max-width:200px;">${row.address}</td>
                    <td>${row.gps}</td>
                    <td><img src="${row.image}" class="thumb"></td>
                </tr>`;
                tbody.innerHTML += tr;
            });
        };
    }

    function updateNextID() {
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            document.getElementById('recordNo').textContent = e.target.result.length + 1;
        };
    }

    init();
</script>
</body>
</html>
