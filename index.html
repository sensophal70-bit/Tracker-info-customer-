<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Capture Tool</title>
    <link rel="manifest" href="manifest.json">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        video, #preview { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 4/3; object-fit: cover; border: 2px solid #ddd; }
        #preview { display: none; }
        .info-box { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: 'Kantumruy Pro'; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Kantumruy Pro'; transition: 0.3s; }
        .btn-capture { background: #007bff; color: white; }
        .btn-save { background: #28a745; color: white; }
        .btn-reset { background: #6c757d; color: white; }
        .btn-refresh { background: #f39c12; color: white; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:#333;">កត់ត្រាទិន្នន័យ</h2>
    
    <video id="webcam" autoplay playsinline></video>
    <img id="preview">

    <div class="info-box">
        <input type="text" id="customerName" placeholder="ឈ្មោះអតិថិជន...">
        <div><strong>កាលបរិច្ឆេទ:</strong> <span id="dateTime">--</span></div>
        <div><strong>GPS:</strong> <span id="location">កំពុងស្វែងរក...</span></div>
    </div>
    
    <div class="btn-group">
        <button id="capBtn" class="btn-capture" onclick="takeSnapshot()">ថតរូប និងចាប់ទិន្នន័យ</button>
        <button id="saveBtn" class="btn-save" onclick="saveAllData()" disabled>រក្សាទុកជា File (Image + Text)</button>
        <button id="resetBtn" class="btn-reset" onclick="resetCamera()" style="display:none;">ថតថ្មី</button>
        <button class="btn-refresh" onclick="refreshApp()">ចាប់ផ្ដើមថ្មី (Refresh)</button>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('webcam');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('hiddenCanvas');
    const dateTimeEl = document.getElementById('dateTime');
    const locationEl = document.getElementById('location');
    const saveBtn = document.getElementById('saveBtn');
    const capBtn = document.getElementById('capBtn');
    const resetBtn = document.getElementById('resetBtn');

    let capturedData = { img: null, name: "", time: "", gps: "" };

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (err) { alert("សូមអនុញ្ញាតកាមេរ៉ា!"); }
    }

    setInterval(() => { dateTimeEl.textContent = new Date().toLocaleString('km-KH'); }, 1000);
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            locationEl.textContent = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
        }, null, { enableHighAccuracy: true });
    }

    function takeSnapshot() {
        const name = document.getElementById('customerName').value;
        if (!name) { alert("សូមបញ្ចូលឈ្មោះអតិថិជន!"); return; }

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        capturedData.img = canvas.toDataURL('image/jpeg');
        capturedData.name = name;
        capturedData.time = dateTimeEl.textContent;
        capturedData.gps = locationEl.textContent;

        preview.src = capturedData.img;
        preview.style.display = 'block';
        video.style.display = 'none';
        
        saveBtn.disabled = false;
        capBtn.style.display = 'none';
        resetBtn.style.display = 'block';
    }

    function saveAllData() {
        const fileName = `Customer_${capturedData.name}_${Date.now()}`;
        const imgLink = document.createElement('a');
        imgLink.download = `${fileName}.jpg`;
        imgLink.href = capturedData.img;
        imgLink.click();

        const textContent = `ព័ត៌មានអតិថិជន\n` +
                            `--------------------------\n` +
                            `ឈ្មោះ: ${capturedData.name}\n` +
                            `កាលបរិច្ឆេទ: ${capturedData.time}\n` +
                            `ទីតាំង GPS: ${capturedData.gps}\n` +
                            `--------------------------`;
        
        const blob = new Blob([textContent], { type: 'text/plain' });
        const textLink = document.createElement('a');
        textLink.download = `${fileName}.txt`;
        textLink.href = URL.createObjectURL(blob);
        textLink.click();
    }

    function resetCamera() {
        video.style.display = 'block';
        preview.style.display = 'none';
        saveBtn.disabled = true;
        capBtn.style.display = 'block';
        resetBtn.style.display = 'none';
    }

    function refreshApp() {
        if (confirm("តើអ្នកចង់សម្អាតទិន្នន័យ និងចាប់ផ្ដើមថ្មីមែនទេ?")) {
            window.location.reload();
        }
    }

    initCamera();
</script>
</body>
</html>
