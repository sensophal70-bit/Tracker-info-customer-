<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Capture Pro - Export Image to Excel</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f2f5; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 20px; text-align: center; }
        video { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 4/3; object-fit: cover; border: 2px solid #007bff; }
        .status-box { background: #f8f9fa; padding: 10px; border-radius: 8px; font-size: 0.85rem; text-align: left; margin: 10px 0; border-left: 5px solid #28a745; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Kantumruy Pro'; transition: 0.2s; }
        .btn-main { background: #28a745; color: white; font-size: 1.1rem; }
        .btn-excel { background: #1d6f42; color: white; }
        .btn-pdf { background: #ad0b00; color: white; }
        .btn-close { background: #dc3545; color: white; }
        
        #reportArea { width: 100%; max-width: 900px; background: white; padding: 15px; border-radius: 10px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #007bff; color: white; }
        .img-preview { width: 60px; height: 45px; object-fit: cover; border-radius: 4px; }
        .no-print { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h3>កត់ត្រាទិន្នន័យ (មានរូបក្នុង Excel)</h3>
    <video id="webcam" autoplay playsinline></video>
    <div class="status-box">
        <div><strong>ID:</strong> <span id="autoID">ID-0001</span></div>
        <div><strong>តំបន់:</strong> <span id="curAddr">កំពុងរក...</span></div>
        <div><strong>GPS:</strong> <span id="curGPS">--</span></div>
    </div>
    <div class="btn-group">
        <button class="btn-main" onclick="captureAndSave()">📷 ថតរូប និងរក្សាទុក</button>
        <button class="btn-close" onclick="stopHardware()">✖ បិទកាមេរ៉ា/GPS</button>
    </div>
</div>

<div id="reportArea">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h4 style="margin:0;">របាយការណ៍សរុប</h4>
        <div style="display:flex; gap:5px;">
            <button class="btn-excel" onclick="exportToExcelWithImages()">📊 Excel (មានរូប)</button>
            <button class="btn-pdf" onclick="exportToPDF()">📄 PDF</button>
        </div>
    </div>
    <table id="dataTable">
        <thead>
            <tr>
                <th>លេខកូដ</th>
                <th>ថ្ងៃម៉ោង</th>
                <th>អាសយដ្ឋាន</th>
                <th>GPS Link</th>
                <th>រូបភាព</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let db, stream, watchID;
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('hiddenCanvas');
    let lat = 0, lon = 0, currentAddress = "";

    // ១. Database Setup
    const request = indexedDB.open("FieldCaptureDB_V2", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; loadTable(); updateNextID(); };

    // ២. Hardware Control
    async function startApp() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            watchID = navigator.geolocation.watchPosition(async pos => {
                lat = pos.coords.latitude; lon = pos.coords.longitude;
                document.getElementById('curGPS').textContent = `${lat}, ${lon}`;
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=km`);
                const data = await res.json();
                currentAddress = data.display_name || "មិនស្គាល់";
                document.getElementById('curAddr').textContent = currentAddress;
            }, null, { enableHighAccuracy: true });
        } catch (e) { alert("សូមអនុញ្ញាតកាមេរ៉ា និង GPS"); }
    }

    function stopHardware() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        if(watchID) navigator.geolocation.clearWatch(watchID);
        alert("Hardware ត្រូវបានបិទ!");
    }

    // ៣. Capture & Save
    function captureAndSave() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imgData = canvas.toDataURL('image/jpeg', 0.6);
        
        const tx = db.transaction("records", "readwrite");
        tx.objectStore("records").add({
            date: new Date().toLocaleString('km-KH'),
            address: currentAddress,
            gps: `${lat},${lon}`,
            image: imgData
        });
        tx.oncomplete = () => { loadTable(); updateNextID(); alert("រក្សាទុកជោគជ័យ!"); };
    }

    // ៤. Load Data to Table
    function loadTable() {
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "";
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            e.target.result.reverse().forEach(item => {
                tbody.innerHTML += `<tr>
                    <td>ID-${item.id}</td>
                    <td>${item.date}</td>
                    <td>${item.address}</td>
                    <td><a href="https://www.google.com/maps?q=${item.gps}" target="_blank">📍 ផែនទី</a></td>
                    <td><img src="${item.image}" class="img-preview"></td>
                </tr>`;
            });
        };
    }

    function updateNextID() {
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            document.getElementById('autoID').textContent = "ID-" + (e.target.result.length + 1);
        };
    }

    // ៥. EXCEL EXPORT (ជាមួយការបង្កប់រូបភាព)
    async function exportToExcelWithImages() {
        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('របាយការណ៍វាល');

        // កំណត់ក្បាលតារាង
        worksheet.columns = [
            { header: 'ID', key: 'id', width: 10 },
            { header: 'ថ្ងៃម៉ោង', key: 'date', width: 25 },
            { header: 'អាសយដ្ឋាន', key: 'address', width: 40 },
            { header: 'GPS', key: 'gps', width: 20 },
            { header: 'រូបភាព', key: 'image', width: 20 }
        ];

        const records = await new Promise(resolve => {
            db.transaction("records").objectStore("records").getAll().onsuccess = e => resolve(e.target.result);
        });

        for (let i = 0; i < records.length; i++) {
            const row = worksheet.addRow({
                id: `ID-${records[i].id}`,
                date: records[i].date,
                address: records[i].address,
                gps: records[i].gps
            });
            row.height = 60; // កំណត់កម្ពស់ជួរដើម្បីដាក់រូប

            // បន្ថែមរូបភាពចូលក្នុង Cell
            const imageId = workbook.addImage({
                base64: records[i].image,
                extension: 'jpeg',
            });
            worksheet.addImage(imageId, {
                tl: { col: 4, row: i + 1 },
                ext: { width: 100, height: 75 }
            });
        }

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), `Report_${Date.now()}.xlsx`);
    }

    // ៦. PDF EXPORT (ធានាថាមានទិន្នន័យ)
    function exportToPDF() {
        const element = document.getElementById('reportArea');
        const opt = {
            margin: 0.2,
            filename: 'Report.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
        };
        // លាក់ប៊ូតុងពេល Export
        document.querySelectorAll('button').forEach(b => b.style.display = 'none');
        html2pdf().set(opt).from(element).save().then(() => {
            document.querySelectorAll('button').forEach(b => b.style.display = 'block');
        });
    }

    startApp();
</script>
</body>
</html>
