<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកត់ត្រា និងរបាយការណ៍ PDF</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        
        :root {
            --primary-color: #007bff;
            --secondary-color: #28a745;
            --danger-color: #dc3545;
        }

        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background: #f0f2f5; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        /* ផ្នែកបញ្ជា (Control Card) */
        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; 
            margin-bottom: 30px; text-align: center;
        }
        video { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 4/3; object-fit: cover; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        button { 
            padding: 12px; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; font-family: 'Kantumruy Pro'; transition: 0.3s;
        }
        .btn-save { background: var(--secondary-color); color: white; font-size: 1.1rem; }
        .btn-pdf { background: #555; color: white; }
        .btn-excel { background: #1d6f42; color: white; }

        /* ស្ទីលតារាងរបាយការណ៍សម្រាប់ PDF */
        #reportArea { 
            width: 100%; max-width: 1000px; background: white; 
            padding: 30px; border-radius: 5px;
        }
        
        .report-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .report-header h2 { margin: 0; color: #333; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; table-layout: fixed; }
        th, td { 
            border: 1px solid #333; padding: 10px; 
            text-align: left; word-wrap: break-word; vertical-align: top;
        }
        th { background-color: #f2f2f2; font-weight: bold; }
        
        /* បង្ការការដាច់រូបភាព ឬអក្សរពេលដាច់ទំព័រ PDF */
        tr { page-break-inside: avoid; page-break-after: auto; }

        .img-cell { width: 100px; height: 75px; object-fit: cover; border-radius: 4px; }
        .maps-url { font-size: 0.7rem; color: var(--primary-color); text-decoration: none; }

        /* លាក់ប៊ូតុងពេលកំពុង Print */
        .no-print { display: none !important; }
    </style>
</head>
<body>

<div class="card" id="inputCard">
    <h3 style="margin-top:0;">ចុះវាល និងចាប់ទិន្នន័យ</h3>
    <video id="webcam" autoplay playsinline></video>
    <div class="btn-group">
        <button class="btn-save" onclick="captureAndSave()">📷 ថតរូប និងរក្សាទុក</button>
        <div style="display:flex; gap:5px;">
            <button class="btn-excel" style="flex:1" onclick="exportToExcel()">📊 Excel</button>
            <button class="btn-pdf" style="flex:1" onclick="exportToPDF()">📄 ទាញយក PDF</button>
        </div>
    </div>
</div>

<div id="reportArea">
    <div class="report-header">
        <h2>របាយការណ៍សកម្មភាពចុះវាល</h2>
        <p>កាលបរិច្ឆេទបង្កើត៖ <span id="reportGenDate"></span></p>
    </div>
    
    <table id="dataTable">
        <thead>
            <tr>
                <th style="width: 8%;">ល.រ</th>
                <th style="width: 18%;">ថ្ងៃម៉ោង</th>
                <th style="width: 35%;">អាសយដ្ឋាន/តំបន់</th>
                <th style="width: 17%;">ទីតាំង GPS</th>
                <th style="width: 22%;">រូបភាពសកម្មភាព</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let db, stream;
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('hiddenCanvas');
    let lat = 0, lon = 0, currentAddress = "កំពុងស្វែងរក...";

    // ១. រៀបចំ Database
    const request = indexedDB.open("ProReportDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; loadTable(); };

    // ២. បើកកាមេរ៉ា និង GPS
    async function initHardware() {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        
        navigator.geolocation.watchPosition(async pos => {
            lat = pos.coords.latitude; lon = pos.coords.longitude;
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=km`);
            const data = await res.json();
            currentAddress = data.display_name || "មិនស្គាល់";
        });
        document.getElementById('reportGenDate').textContent = new Date().toLocaleDateString('km-KH');
    }

    // ៣. ថតរូប និងរក្សាទុក
    function captureAndSave() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const imgData = canvas.toDataURL('image/jpeg', 0.7);

        const tx = db.transaction("records", "readwrite");
        tx.objectStore("records").add({
            time: new Date().toLocaleString('km-KH'),
            address: currentAddress,
            gps: `${lat.toFixed(6)}, ${lon.toFixed(6)}`,
            image: imgData
        });
        tx.oncomplete = () => { loadTable(); alert("រក្សាទុកបានជោគជ័យ!"); };
    }

    // ៤. បង្ហាញក្នុងតារាង
    function loadTable() {
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "";
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            e.target.result.forEach((item, index) => {
                const mapsUrl = `https://www.google.com/maps?q=${item.gps.replace(' ', '')}`;
                tbody.innerHTML += `<tr>
                    <td style="text-align:center;">${index + 1}</td>
                    <td>${item.time}</td>
                    <td>${item.address}</td>
                    <td><a href="${mapsUrl}" class="maps-url" target="_blank">📍 ចុចមើលផែនទី<br>(${item.gps})</a></td>
                    <td style="text-align:center;"><img src="${item.image}" class="img-cell"></td>
                </tr>`;
            });
        };
    }

    // ៥. EXPORT PDF (រៀបចំស្អាត មិនដាច់អក្សរ)
    function exportToPDF() {
        const element = document.getElementById('reportArea');
        const opt = {
            margin: [0.5, 0.3, 0.5, 0.3], // [លើ, ឆ្វេង, ក្រោម, ស្ដាំ]
            filename: 'របាយការណ៍_ចុះវាល.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { 
                scale: 2, 
                useCORS: true,
                letterRendering: true 
            },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' },
            pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };

        // លាក់ Card បញ្ជាពេលកំពុង Generate
        document.getElementById('inputCard').classList.add('no-print');
        
        html2pdf().set(opt).from(element).save().then(() => {
            document.getElementById('inputCard').classList.remove('no-print');
        });
    }

    // ៦. EXPORT EXCEL (មានរូបភាព)
    async function exportToExcel() {
        const workbook = new ExcelJS.Workbook();
        const worksheet = workbook.addWorksheet('Report');
        worksheet.columns = [
            { header: 'ល.រ', key: 'id', width: 5 },
            { header: 'ថ្ងៃម៉ោង', key: 'time', width: 25 },
            { header: 'អាសយដ្ឋាន', key: 'address', width: 50 },
            { header: 'GPS', key: 'gps', width: 20 }
        ];

        const records = await new Promise(r => {
            db.transaction("records").objectStore("records").getAll().onsuccess = e => r(e.target.result);
        });

        for(let i=0; i<records.length; i++) {
            worksheet.addRow({ id: i+1, time: records[i].time, address: records[i].address, gps: records[i].gps });
            const imgId = workbook.addImage({ base64: records[i].image, extension: 'jpeg' });
            worksheet.addImage(imgId, { tl: { col: 4, row: i+1 }, ext: { width: 100, height: 70 } });
            worksheet.getRow(i+2).height = 60;
        }

        const buffer = await workbook.xlsx.writeBuffer();
        saveAs(new Blob([buffer]), "របាយការណ៍.xlsx");
    }

    initHardware();
</script>
</body>
</html>
