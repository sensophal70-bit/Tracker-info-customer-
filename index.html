<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Field Capture Pro - Search by Date</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #f39c12; }
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f0f4f7; padding: 15px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* កាមេរ៉ា */
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 420px; margin-bottom: 20px; text-align: center; }
        video { width: 100%; border-radius: 10px; background: #000; aspect-ratio: 4/3; object-fit: cover; border: 2px solid var(--primary); }
        
        /* ផ្នែក Search */
        .search-section { width: 100%; max-width: 1000px; background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .search-section input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Kantumruy Pro'; }
        #textSearch { flex: 2; min-width: 200px; }
        #dateSearch { flex: 1; min-width: 150px; }

        button { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-family: 'Kantumruy Pro'; transition: 0.2s; }
        .btn-save { background: var(--success); color: white; font-size: 1.1rem; width: 100%; margin-top: 10px; }
        
        /* តារាង */
        #reportArea { width: 100%; max-width: 1050px; background: white; padding: 20px; border-radius: 8px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; min-width: 850px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; position: sticky; top: 0; }
        .img-cell { width: 70px; height: 50px; object-fit: cover; border-radius: 4px; }

        /* Modal */
        #editModal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.3); border-radius: 12px; z-index: 1000; width: 90%; max-width: 400px; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

<div class="card">
    <video id="webcam" autoplay playsinline></video>
    <button class="btn-save" onclick="captureAndSave()">📷 ថតរូប និងរក្សាទុក</button>
    <div style="display:flex; gap:8px; margin-top:10px;">
        <button style="background: var(--warning); color:white; flex:1" onclick="location.reload()">🔄 Refresh</button>
        <button style="background: #6c757d; color:white; flex:1" onclick="stopHardware()">✖ បិទកាមេរ៉ា</button>
    </div>
</div>

<div class="search-section">
    <input type="text" id="textSearch" placeholder="🔍 ស្វែងរកតាម ID ឬ អាសយដ្ឋាន..." onkeyup="loadTable()">
    <div style="display:flex; align-items:center; gap:5px;">
        <span style="font-size:0.8rem;">ថ្ងៃទី៖</span>
        <input type="date" id="dateSearch" onchange="loadTable()">
    </div>
    <button style="background: var(--danger); color:white;" onclick="deleteSelected()">🗑️ លុបដែលរើស</button>
    <button style="background: #eee; color:#333;" onclick="resetSearch()">🧹 Clear</button>
</div>

<div id="reportArea">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
        <h3 style="margin:0;">របាយការណ៍សកម្មភាព</h3>
        <div style="display:flex; gap:8px;">
            <button style="background:#1d6f42; color:white;" onclick="exportToExcel()">📊 Excel</button>
            <button style="background:#ad0b00; color:white;" onclick="exportToPDF()">📄 PDF (ទាំងអស់)</button>
        </div>
    </div>
    <table id="dataTable">
        <thead>
            <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                <th>ID</th><th>ថ្ងៃទី</th><th>ម៉ោង</th><th>អាសយដ្ឋាន/តំបន់</th><th>រូបភាព</th><th>សកម្មភាព</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div id="editModal">
    <h4>កែសម្រួលអាសយដ្ឋាន</h4>
    <input type="hidden" id="editId">
    <textarea id="editAddr" style="width:100%; height:100px; padding:10px; font-family:'Kantumruy Pro'; border-radius:5px; border:1px solid #ccc;"></textarea>
    <div style="display:flex; gap:8px; margin-top:15px;">
        <button onclick="updateData()" style="background: var(--success); color:white; flex:1">Update</button>
        <button onclick="closeModal()" style="background: #ccc; flex:1">បោះបង់</button>
    </div>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let db, stream, watchID, lat=0, lon=0, currentAddress="";
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('hiddenCanvas');

    const request = indexedDB.open("FieldCaptureDB_Final", 1);
    request.onupgradeneeded = e => { e.target.result.createObjectStore("records", { keyPath: "id", autoIncrement: true }); };
    request.onsuccess = e => { db = e.target.result; loadTable(); startHardware(); };

    async function startHardware() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            watchID = navigator.geolocation.watchPosition(async pos => {
                lat = pos.coords.latitude; lon = pos.coords.longitude;
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=km`);
                const data = await res.json();
                currentAddress = data.display_name || "មិនស្គាល់ទីតាំង";
            });
        } catch (e) { alert("សូមអនុញ្ញាតឱ្យប្រើប្រាស់ Camera/GPS"); }
    }

    function captureAndSave() {
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const img = canvas.toDataURL('image/jpeg', 0.6);
        const now = new Date();
        const tx = db.transaction("records", "readwrite");
        tx.objectStore("records").add({
            date: now.toLocaleDateString('km-KH'), // រក្សាទុកជា ថ្ងៃ/ខែ/ឆ្នាំ
            time: now.toLocaleTimeString('km-KH'),
            address: currentAddress,
            gps: `${lat.toFixed(6)}, ${lon.toFixed(6)}`,
            image: img
        });
        tx.oncomplete = () => loadTable();
    }

    // មុខងារ Search រួមបញ្ចូលគ្នា (Text + Date)
    function loadTable() {
        const textQ = document.getElementById('textSearch').value.toLowerCase();
        const dateQ = document.getElementById('dateSearch').value; // ទម្រង់ YYYY-MM-DD
        const tbody = document.querySelector("#dataTable tbody");
        tbody.innerHTML = "";

        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            let data = e.target.result;

            // ១. ស្វែងរកតាមអត្ថបទ
            if (textQ) {
                data = data.filter(i => i.address.toLowerCase().includes(textQ) || (`ID-${i.id}`).toLowerCase().includes(textQ));
            }

            // ២. ស្វែងរកតាមថ្ងៃខែ
            if (dateQ) {
                const [y, m, d] = dateQ.split('-');
                const formattedDate = `${parseInt(d)}/${parseInt(m)}/${y}`; // បម្លែងទៅជាទម្រង់ថ្ងៃ/ខែ/ឆ្នាំ ខ្មែរ
                data = data.filter(i => i.date === formattedDate);
            }

            data.reverse().forEach(item => {
                tbody.innerHTML += `<tr>
                    <td><input type="checkbox" class="row-select" value="${item.id}"></td>
                    <td>ID-${item.id}</td><td>${item.date}</td><td>${item.time}</td><td>${item.address}</td>
                    <td><img src="${item.image}" class="img-cell"></td>
                    <td>
                        <button style="background:var(--warning); padding:5px;" onclick="openEdit(${item.id}, '${item.address.replace(/'/g, "\\'")}')">📝</button>
                        <button style="background:var(--danger); color:white; padding:5px;" onclick="deleteSingle(${item.id})">🗑️</button>
                    </td>
                </tr>`;
            });
        };
    }

    function resetSearch() {
        document.getElementById('textSearch').value = "";
        document.getElementById('dateSearch').value = "";
        loadTable();
    }

    // Export PDF (ទាញយកទិន្នន័យទាំងអស់)
    async function exportToPDF() {
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            const allData = e.target.result;
            if (allData.length === 0) return alert("គ្មានទិន្នន័យ!");

            const container = document.createElement('div');
            container.style.padding = "20px";
            container.innerHTML = `
                <div style="text-align:center; border-bottom:2px solid #333; margin-bottom:20px;">
                    <h2 style="font-family:'Kantumruy Pro';">របាយការណ៍សកម្មភាពចុះវាលសរុប</h2>
                    <p style="font-family:'Kantumruy Pro';">ថ្ងៃបង្កើត៖ ${new Date().toLocaleDateString('km-KH')}</p>
                </div>
                <table style="width:100%; border-collapse:collapse; font-family:'Kantumruy Pro'; font-size:10px;">
                    <thead><tr style="background:#007bff; color:white;">
                        <th style="border:1px solid #333; padding:8px;">ID</th>
                        <th style="border:1px solid #333; padding:8px;">ថ្ងៃទី</th>
                        <th style="border:1px solid #333; padding:8px;">ម៉ោង</th>
                        <th style="border:1px solid #333; padding:8px;">អាសយដ្ឋាន</th>
                        <th style="border:1px solid #333; padding:8px;">GPS</th>
                        <th style="border:1px solid #333; padding:8px;">រូបភាព</th>
                    </tr></thead>
                    <tbody>
                        ${allData.reverse().map(item => `
                            <tr style="page-break-inside: avoid;">
                                <td style="border:1px solid #333; padding:8px; text-align:center;">ID-${item.id}</td>
                                <td style="border:1px solid #333; padding:8px;">${item.date}</td>
                                <td style="border:1px solid #333; padding:8px;">${item.time}</td>
                                <td style="border:1px solid #333; padding:8px;">${item.address}</td>
                                <td style="border:1px solid #333; padding:8px;">${item.gps}</td>
                                <td style="border:1px solid #333; padding:5px; text-align:center;">
                                    <img src="${item.image}" style="width:80px; height:60px; object-fit:cover;">
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            html2pdf().set({ margin:0.3, filename:'Full_Report.pdf', image:{type:'jpeg', quality:0.98}, html2canvas:{scale:2}, jsPDF:{unit:'in', format:'a4', orientation:'landscape'} }).from(container).save();
        };
    }

    async function exportToExcel() {
        const workbook = new ExcelJS.Workbook();
        const ws = workbook.addWorksheet('Report');
        ws.columns = [{header:'ID', key:'id', width:10},{header:'ថ្ងៃទី', key:'date', width:15},{header:'ម៉ោង', key:'time', width:15},{header:'អាសយដ្ឋាន', key:'address', width:50},{header:'GPS', key:'gps', width:20}];
        db.transaction("records").objectStore("records").getAll().onsuccess = async e => {
            const d = e.target.result;
            for(let i=0; i<d.length; i++) {
                ws.addRow({id:`ID-${d[i].id}`, date:d[i].date, time:d[i].time, address:d[i].address, gps:d[i].gps});
                const imgId = workbook.addImage({ base64: d[i].image, extension: 'jpeg' });
                ws.addImage(imgId, { tl: { col: 5, row: i+1 }, ext: { width: 100, height: 75 } });
                ws.getRow(i+2).height = 60;
            }
            saveAs(new Blob([await workbook.xlsx.writeBuffer()]), "Field_Report.xlsx");
        };
    }

    // មុខងារដទៃទៀត (Edit, Delete, Select)
    function openEdit(id, addr) { document.getElementById('editId').value = id; document.getElementById('editAddr').value = addr; document.getElementById('editModal').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
    function closeModal() { document.getElementById('editModal').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
    function updateData() {
        const id = parseInt(document.getElementById('editId').value);
        const newAddr = document.getElementById('editAddr').value;
        const store = db.transaction("records", "readwrite").objectStore("records");
        store.get(id).onsuccess = e => {
            const data = e.target.result;
            data.address = newAddr;
            store.put(data).onsuccess = () => { closeModal(); loadTable(); };
        };
    }
    function deleteSingle(id) { if(confirm("លុប ID-"+id+"?")) db.transaction("records", "readwrite").objectStore("records").delete(id).onsuccess = () => loadTable(); }
    function toggleSelectAll() { const isChecked = document.getElementById('selectAll').checked; document.querySelectorAll('.row-select').forEach(cb => cb.checked = isChecked); }
    function deleteSelected() {
        const s = Array.from(document.querySelectorAll('.row-select:checked')).map(cb => parseInt(cb.value));
        if(s.length === 0) return alert("សូមជ្រើសរើស!");
        if(confirm("លុបទាំង "+s.length+"?")) {
            const tx = db.transaction("records", "readwrite");
            s.forEach(id => tx.objectStore("records").delete(id));
            tx.oncomplete = () => loadTable();
        }
    }
    function stopHardware() { if(stream) stream.getTracks().forEach(t => t.stop()); if(watchID) navigator.geolocation.clearWatch(watchID); }
</script>
</body>
</html>
