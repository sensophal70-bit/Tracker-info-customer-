<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធគ្រប់គ្រងទិន្នន័យវាល - Khmer Support</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background: #f0f2f5; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; 
            margin-bottom: 20px; text-align: center;
        }

        video { 
            width: 100%; border-radius: 10px; background: #000; 
            aspect-ratio: 4/3; object-fit: cover; border: 2px solid #007bff;
        }

        .status-box { 
            background: #f8f9fa; padding: 12px; border-radius: 8px; 
            font-size: 0.9rem; text-align: left; margin: 15px 0;
            border-left: 5px solid #28a745;
        }

        .btn-group { display: flex; flex-direction: column; gap: 8px; }
        .btn-row { display: flex; gap: 8px; }

        button { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: bold; font-family: 'Kantumruy Pro'; 
            transition: 0.2s;
        }

        .btn-main { background: #28a745; color: white; font-size: 1.1rem; padding: 15px; }
        .btn-refresh { background: #f39c12; color: white; }
        .btn-close { background: #dc3545; color: white; }
        .btn-export { background: #17a2b8; color: white; flex: 1; font-size: 0.8rem; }
        .btn-pdf { background: #6c757d; color: white; flex: 1; font-size: 0.8rem; }

        button:active { transform: scale(0.98); opacity: 0.9; }

        /* តារាង */
        .table-section { width: 100%; max-width: 900px; background: white; padding: 15px; border-radius: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #007bff; color: white; }
        .img-thumb { width: 45px; border-radius: 3px; }

        /* សម្រាប់ Print PDF */
        @media print {
            body * { visibility: hidden; }
            #printableArea, #printableArea * { visibility: visible; }
            #printableArea { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="card no-print">
    <h3 style="margin-top:0;">កត់ត្រាស្វ័យប្រវត្តិ (Khmer)</h3>
    <video id="webcam" autoplay playsinline></video>

    <div class="status-box">
        <div><strong>ID:</strong> <span id="autoID">--</span></div>
        <div><strong>ថ្ងៃម៉ោង:</strong> <span id="curDate">--</span></div>
        <div><strong>តំបន់:</strong> <span id="curAddr">កំពុងស្វែងរក...</span></div>
        <div><strong>GPS:</strong> <span id="curGPS">--</span></div>
    </div>
    
    <div class="btn-group">
        <button class="btn-main" onclick="autoCaptureAndSave()">📷 ថតរូប និងរក្សាទុក</button>
        <div class="btn-row">
            <button class="btn-refresh" onclick="window.location.reload()">🔄 Refresh</button>
            <button class="btn-close" onclick="closeApp()">✖ បិទ</button>
        </div>
    </div>
</div>

<div class="table-section" id="printableArea">
    <h4 style="margin:5px 0;">ទិន្នន័យបានរក្សាទុក</h4>
    <div class="btn-row no-print" style="margin-bottom: 10px;">
        <button class="btn-export" onclick="exportToExcel()">📊 Export Excel</button>
        <button class="btn-pdf" onclick="exportToPDF()">📄 Export PDF</button>
    </div>
    <table id="custTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>ថ្ងៃម៉ោង</th>
                <th>តំបន់ (Address)</th>
                <th>GPS Link</th>
                <th>រូបភាព</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let db;
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('hiddenCanvas');
    let lat = 0, lon = 0, currentAddress = "កំពុងស្វែងរក...";

    // ១. បង្កើត Database
    const request = indexedDB.open("FieldCaptureDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadTable();
        updateNextID();
    };

    // ២. ចាប់ផ្ដើម Camera & GPS (Khmer Address)
    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) { alert("សូមបើកកាមេរ៉ា!"); }

        setInterval(() => {
            document.getElementById('curDate').textContent = new Date().toLocaleString('km-KH');
        }, 1000);

        navigator.geolocation.watchPosition(async pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            document.getElementById('curGPS').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            
            try {
                // API នេះផ្ដល់ឈ្មោះតំបន់ជាភាសាខ្មែរ
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=km`);
                const data = await res.json();
                currentAddress = data.display_name;
                document.getElementById('curAddr').textContent = currentAddress;
            } catch (err) { currentAddress = "មិនអាចទាញយកឈ្មោះតំបន់"; }
        }, null, { enableHighAccuracy: true });
    }

    // ៣. ថតរូប និងរក្សាទុក
    function autoCaptureAndSave() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const capturedImg = canvas.toDataURL('image/jpeg', 0.6);

        const transaction = db.transaction(["records"], "readwrite");
        const store = transaction.objectStore("records");
        const data = {
            date: document.getElementById('curDate').textContent,
            address: currentAddress,
            gps: `${lat},${lon}`,
            image: capturedImg
        };

        store.add(data).onsuccess = () => {
            loadTable();
            updateNextID();
            alert("រក្សាទុកជោគជ័យ!");
        };
    }

    // ៤. បង្ហាញក្នុងតារាង
    function loadTable() {
        const tbody = document.querySelector("#custTable tbody");
        tbody.innerHTML = "";
        db.transaction("records").objectStore("records").openCursor(null, 'prev').onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const item = cursor.value;
                const tr = `<tr>
                    <td>ID-${item.id.toString().padStart(4, '0')}</td>
                    <td>${item.date}</td>
                    <td>${item.address}</td>
                    <td><a href="https://maps.google.com/?q=${item.gps}" target="_blank">📍 ផែនទី</a></td>
                    <td><img src="${item.image}" class="img-thumb"></td>
                </tr>`;
                tbody.innerHTML += tr;
                cursor.continue();
            }
        };
    }

    function updateNextID() {
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            document.getElementById('autoID').textContent = "ID-" + (e.target.result.length + 1).toString().padStart(4, '0');
        };
    }

    // ៥. Export to Excel (គាំទ្រ Font ខ្មែរ)
    function exportToExcel() {
        let csvContent = "\uFEFF"; // UTF-8 BOM សម្រាប់អក្សរខ្មែរ
        csvContent += "ID,កាលបរិច្ឆេទ,តំបន់,GPS\n";

        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            e.target.result.forEach(row => {
                let addr = row.address.replace(/,/g, " "); // លុបក្បៀសចេញកុំឱ្យច្រឡំ Column
                csvContent += `ID-${row.id},${row.date},${addr},${row.gps}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "របាយការណ៍_ទិន្នន័យវាល.csv";
            link.click();
        };
    }

    // ៦. Export to PDF (ប្រើ Browser Print)
    function exportToPDF() {
        window.print();
    }

    function closeApp() {
        if (confirm("តើអ្នកចង់បិទកម្មវិធីមែនទេ?")) window.location.href = "about:blank";
    }

    startApp();
</script>
</body>
</html>
