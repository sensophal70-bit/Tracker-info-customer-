<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្រព័ន្ធកត់ត្រាស្វ័យប្រវត្តិ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;700&display=swap');
        
        body { 
            font-family: 'Kantumruy Pro', sans-serif; 
            background: #f0f2f5; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; 
            margin-bottom: 20px; text-align: center;
        }

        video { 
            width: 100%; border-radius: 10px; background: #000; 
            aspect-ratio: 4/3; object-fit: cover; border: 2px solid #007bff;
        }

        .status-box { 
            background: #f8f9fa; padding: 12px; border-radius: 8px; 
            font-size: 0.9rem; text-align: left; margin: 15px 0;
            border-left: 5px solid #28a745;
        }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        button { 
            width: 100%; padding: 15px; border: none; border-radius: 8px; 
            cursor: pointer; font-weight: bold; font-family: 'Kantumruy Pro'; 
            font-size: 1.1rem; transition: 0.2s;
        }

        .btn-main { background: #28a745; color: white; } /* ពណ៌បៃតងសម្រាប់ថត */
        .btn-close { background: #dc3545; color: white; } /* ពណ៌ក្រហមសម្រាប់បិទ */
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* តារាង */
        .table-section { width: 100%; max-width: 800px; background: white; padding: 10px; border-radius: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #343a40; color: white; }
        .maps-link { color: #007bff; text-decoration: none; font-weight: bold; }
        .img-thumb { width: 50px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="margin-top:0; color:#333;">កត់ត្រាទិន្នន័យស្វ័យប្រវត្តិ</h3>
    
    <video id="webcam" autoplay playsinline></video>

    <div class="status-box">
        <div><strong>លេខកូដអតិថិជន:</strong> <span id="autoID" style="color:#007bff; font-weight:bold;">--</span></div>
        <div><strong>ម៉ោង:</strong> <span id="curDate">--</span></div>
        <div><strong>តំបន់:</strong> <span id="curAddr">កំពុងស្វែងរក...</span></div>
        <div><strong>GPS:</strong> <span id="curGPS">--</span></div>
    </div>
    
    <div class="btn-group">
        <button class="btn-main" onclick="autoCaptureAndSave()">📷 ថតរូប និងរក្សាទុក</button>
        <button class="btn-close" onclick="closeApp()">✖ បិទកម្មវិធី</button>
    </div>
</div>

<div class="table-section">
    <h4 style="margin:5px 0;">ទិន្នន័យបានរក្សាទុក</h4>
    <table id="custTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>កាលបរិច្ឆេទ</th>
                <th>តំបន់</th>
                <th>Map</th>
                <th>រូប</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<canvas id="hiddenCanvas" style="display:none;"></canvas>

<script>
    let db;
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('hiddenCanvas');
    let lat, lon, currentAddress = "មិនស្គាល់តំបន់";

    // ១. បង្កើត Database (IndexedDB)
    const request = indexedDB.open("AutoStoreDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        db.createObjectStore("records", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => {
        db = e.target.result;
        loadTable();
        updateNextID();
    };

    // ២. ចាប់ផ្ដើម Camera & GPS
    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        } catch (e) { alert("សូមអនុញ្ញាតប្រើកាមេរ៉ា!"); }

        setInterval(() => {
            document.getElementById('curDate').textContent = new Date().toLocaleString('km-KH');
        }, 1000);

        navigator.geolocation.watchPosition(async pos => {
            lat = pos.coords.latitude;
            lon = pos.coords.longitude;
            document.getElementById('curGPS').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;
            
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&accept-language=km`);
                const data = await res.json();
                currentAddress = data.display_name.split(',').slice(0,3).join(',');
                document.getElementById('curAddr').textContent = currentAddress;
            } catch (err) { }
        }, null, { enableHighAccuracy: true });
    }

    // ៣. ថតរូប និងរក្សាទុកភ្លាមៗ (One Click)
    function autoCaptureAndSave() {
        // ចាប់យករូបភាពក្នុង Canvas
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const capturedImg = canvas.toDataURL('image/jpeg', 0.7);

        // រៀបចំទិន្នន័យ
        const transaction = db.transaction(["records"], "readwrite");
        const store = transaction.objectStore("records");
        const data = {
            date: document.getElementById('curDate').textContent,
            address: currentAddress,
            gps: `${lat},${lon}`,
            image: capturedImg
        };

        // រក្សាទុកក្នុង DB
        store.add(data).onsuccess = () => {
            console.log("Saved!");
            loadTable(); // អាប់ដេតតារាង
            updateNextID(); // ប្ដូរលេខ ID បន្ទាប់
            alert("រក្សាទុកជោគជ័យសម្រាប់ ID: " + document.getElementById('autoID').textContent);
        };
    }

    // ៤. បង្ហាញក្នុងតារាង
    function loadTable() {
        const tbody = document.querySelector("#custTable tbody");
        tbody.innerHTML = "";
        db.transaction("records").objectStore("records").openCursor(null, 'prev').onsuccess = e => {
            const cursor = e.target.result;
            if (cursor) {
                const item = cursor.value;
                const mapsUrl = `https://www.google.com/maps?q=${item.gps}`;
                const tr = `<tr>
                    <td>ID-${item.id.toString().padStart(4, '0')}</td>
                    <td>${item.date}</td>
                    <td>${item.address}</td>
                    <td><a href="${mapsUrl}" target="_blank" class="maps-link">📍 Map</a></td>
                    <td><img src="${item.image}" class="img-thumb"></td>
                </tr>`;
                tbody.innerHTML += tr;
                cursor.continue();
            }
        };
    }

    function updateNextID() {
        db.transaction("records").objectStore("records").getAll().onsuccess = e => {
            const nextID = e.target.result.length + 1;
            document.getElementById('autoID').textContent = "ID-" + nextID.toString().padStart(4, '0');
        };
    }

    // ៥. ប៊ូតុងបិទ
    function closeApp() {
        if (confirm("តើអ្នកចង់បិទកម្មវិធីមែនទេ?")) {
            window.close();
            // បើ window.close() មិនដើរ (Security browser) គឺវាធ្វើការ Reload
            window.location.href = "about:blank";
        }
    }

    startApp();
</script>
</body>
</html>
